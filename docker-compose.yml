services:
  postgres:
    image: postgres:16-alpine
    container_name: hitl-postgres
    environment:
      POSTGRES_USER: hitl
      POSTGRES_PASSWORD: hitl
      POSTGRES_DB: hitl_audit
    ports:
      - "1505:5432"
    volumes:
      - hitl_pgdata:/var/lib/postgresql/data
      - ./audit/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hitl -d hitl_audit"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  hitl_pgdata:
